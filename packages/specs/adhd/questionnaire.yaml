version: '1.0'
name: ADHD Core Questionnaire (ASRS v1.1)
description: Adult ADHD Self-Report Scale for screening and preparation

metadata:
  clinical_validity: validated
  language: en-US
  domains:
    - inattention
    - hyperactivity_impulsivity
  min_score: 0
  max_score: 72

subscales:
  - id: inattention
    name: Inattention
    description: Inability to sustain attention
    min_score: 0
    max_score: 36
    questions:
      - id: Q1
        text: 'How often do you have trouble wrapping up the final details of a project, once the challenging parts have been done?'
        type: likert_5
        weight: 1.0
        domain: inattention

      - id: Q2
        text: 'How often do you have difficulty getting things in order when you have to do a task that requires organization?'
        type: likert_5
        weight: 1.0
        domain: inattention

      - id: Q3
        text: 'How often do you have problems remembering appointments or obligations?'
        type: likert_5
        weight: 1.0
        domain: inattention

      - id: Q4
        text: 'When you have a task that requires a lot of thought, how often do you avoid or delay getting started?'
        type: likert_5
        weight: 1.0
        domain: inattention

      - id: Q5
        text: 'How often do you fidget or squirm with your hands or feet when you have to sit down for a long time?'
        type: likert_5
        weight: 1.0
        domain: hyperactivity

      - id: Q6
        text: 'How often do you feel overly active and compelled to do things, like you were driven by a motor?'
        type: likert_5
        weight: 1.0
        domain: hyperactivity

answer_options:
  - value: 0
    label: Never or Rarely
    description: Symptom occurs 0-10% of the time

  - value: 1
    label: Sometimes
    description: Symptom occurs 11-40% of the time

  - value: 2
    label: Often
    description: Symptom occurs 41-70% of the time

  - value: 3
    label: Very Often
    description: Symptom occurs 71-100% of the time

  - value: 4
    label: Constantly or Almost Always
    description: Symptom is almost always present

validation:
  total_questions: 6
  required_answers: true
  min_response_time_seconds: 60
  max_response_time_seconds: 600
  allow_incomplete: false
